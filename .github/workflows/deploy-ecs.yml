name: CI/CD to ECS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        working-directory: api
        run: |
          source .venv/bin/activate
          pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- AI gate (Lambda) ----
      - name: Build AI gate input payload
        id: ai-input
        run: |
          cat > ai_payload.json << 'EOF'
          {
            "commit_sha": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "tests": {
              "status": "passed",
              "total": 1,
              "failed": 0
            },
            "diff": {
              "files_changed": 1,
              "insertions": 10,
              "deletions": 2
            },
            "service": {
              "name": "task-tracker-api",
              "environment": "prod"
            }
          }
          EOF

      - name: Invoke AI gate Lambda
        id: ai-gate
        run: |
          aws lambda invoke \
            --function-name task-tracker-ai-gate \
            --payload file://ai_payload.json \
            --cli-binary-format raw-in-base64-out \
            ai_response.json

          echo "Lambda raw response:"
          cat ai_response.json

          # Take only the last JSON line from the file as the AI result
          AI_RESULT=$(tail -n 1 ai_response.json)
          echo "AI_RESULT=$AI_RESULT" >> $GITHUB_OUTPUT

      - name: Check AI gate decision
        id: ai-decision
        run: |
          echo "AI result: ${{ steps.ai-gate.outputs.AI_RESULT }}"
          DECISION=$(echo '${{ steps.ai-gate.outputs.AI_RESULT }}' | jq -r '.decision')
          echo "Decision from AI gate: $DECISION"

          if [ "$DECISION" = "block" ]; then
            echo "AI gate decided to BLOCK deployment."
            exit 1
          fi

          if [ "$DECISION" = "warn" ]; then
            echo "AI gate WARNED about this deploy. Continuing but you may want to notify."
          fi

      # ---- Build & deploy to ECS ----
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${AWS_REGION} \
            | docker login \
              --username AWS \
              --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Build Docker image
        id: build-image
        working-directory: api
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${SHORT_SHA}
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_OUTPUT

          docker build -t $IMAGE_URI .

      - name: Push image to ECR
        run: |
          docker push ${{ steps.build-image.outputs.IMAGE_URI }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"